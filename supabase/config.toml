# Supabase local dev configuration
# Docs: https://supabase.com/docs/guides/local-development

project_id = "schengen-journey"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.documents]
# Bucket for customer-uploaded visa documents
public = false
file_size_limit = "10MiB"
allowed_mime_types = [
  "application/pdf",
  "image/jpeg",
  "image/png",
  "image/webp"
]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

[auth.sms]
enable_signup = false
enable_confirmations = false

[analytics]
enabled = false
